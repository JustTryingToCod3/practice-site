<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Lounge: A break for your brain</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ---------- Global ---------- */

body{
margin:0;
font-family:'Orbitron',sans-serif;

/* darker rain atmosphere */
background:
linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.8)),
url("rain.jpg");

background-size:cover;
background-position:center;

color:white;

/* vertical centering */
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

/* ---------- Title ---------- */

h1{
letter-spacing:3px;
font-size:2rem;
margin-top:40px;
}

/* ---------- Cafe Layout ---------- */

.cafe{

max-width:800px;
width:90%;

margin-top:40px;

display:grid;
grid-template-columns:1fr 1fr;
gap:25px;

}

/* ---------- Object Boxes ---------- */

.object{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;
color:white;

/* glass cafe style */
background:rgba(0,0,0,0.55);
border:1px solid rgba(255,255,255,0.2);
border-radius:15px;

backdrop-filter:blur(4px);

height:150px;

font-size:50px;

transition:
transform .25s,
box-shadow .25s,
background .25s;

}

/* ---------- Hover Effects ---------- */

.object:hover{

transform:translateY(-6px) scale(1.05);

background:rgba(0,0,0,0.75);

box-shadow:
0 0 15px rgba(255,255,255,0.5),
0 0 30px #00eaff;

}

/* ---------- Labels ---------- */

.label{

font-size:14px;
margin-top:10px;

}

/* center last item if odd */

.object:last-child{
grid-column:1 / span 2;
max-width:300px;
justify-self:center;
}

/* ---------- Mobile ---------- */

@media(max-width:700px){

.cafe{
grid-template-columns:1fr;
}

.object:last-child{
grid-column:auto;
max-width:none;
}

.object{
height:130px;
font-size:40px;
}

}

</style>
</head>

<body>

<h1>☕ Life Lounge Café</h1>

<div class="cafe">

<a href="html/tarot/tarot.html" class="object">
🔮
<span class="label">Tarot Reading</span>
</a>

<a href="html/therapy/badtherapy.html" class="object">
🛋
<span class="label">Bad Therapist</span>
</a>

<a href="html/m8/m8ball.html" class="object">
🎱
<span class="label">Fortune Machine</span>
</a>

<a href="html/relax/relax.html" class="object">
🌿
<span class="label">Relax Corner</span>
</a>

<a href="html/horror/horror.html" class="object">
🚪
<span class="label">Basement</span>
</a>

<a href="html/blog/blog.html" class="object">
📓
<span class="label">Journal Table</span>
</a>

<a href="html/budget/budget.html" class="object">
💰
<span class="label">Budget Desk</span>
</a>

</div>

</body>
</html>
