<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Lounge Café</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/*Globa */

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(#1c1c1c,#000);
overflow:hidden;
color:white;
}

/*Title  */

h1{
position:absolute;
top:20px;
width:100%;
text-align:center;
letter-spacing:3px;
font-size:2rem;
z-index:10;
}

/* Cafe Room - */

.cafe{
height:100vh;
width:100%;
position:relative;
}

/* Object styling */

.object{

position:absolute;
text-align:center;
font-size:50px;
text-decoration:none;
color:white;
cursor:pointer;

transition:
transform .25s,
filter .25s,
text-shadow .25s;

}

/* hover glow */

.object:hover{

transform:scale(1.25);

text-shadow:
0 0 10px white,
0 0 20px #00eaff,
0 0 40px #00eaff;

filter:brightness(1.2);

}

/* labels */

.label{
display:block;
font-size:14px;
margin-top:5px;
}

/*Object positions */

.tarot{
bottom:40%;
left:30%;
}

.therapy{
bottom:38%;
left:60%;
}

.fortune{
bottom:45%;
left:48%;
}

.relax{
bottom:20%;
left:25%;
}

.basement{
bottom:28%;
left:82%;
}

.blog{
bottom:50%;
left:15%;
}

.budget{
bottom:20%;
left:50%;
}

/* Atmosphere */

.cafe::after{

content:"";
position:absolute;

width:100%;
height:100%;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.05),
transparent 70%);

pointer-events:none;

}

/* Mobile devices - */

@media(max-width:700px){

.object{
font-size:38px;
}

h1{
font-size:1.5rem;
}

}

</style>
</head>


<body>

<h1>☕ Life Lounge Café</h1>

<div class="cafe">

<a href="html/tarot/tarot.html" class="object tarot">
🔮
<span class="label">Tarot Table</span>
</a>

<a href="html/therapy/badtherapy.html" class="object therapy">
🛋
<span class="label">Bad Therapist</span>
</a>

<a href="html/m8/m8ball.html" class="object fortune">
🎱
<span class="label">Fortune Machine</span>
</a>

<a href="html/relax/relax.html" class="object relax">
🌿
<span class="label">Relax Corner</span>
</a>

<a href="html/horror/horror.html" class="object basement">
🚪
<span class="label">Basement</span>
</a>

<a href="html/blog/blog.html" class="object blog">
📓
<span class="label">Journal Table</span>
</a>

<a href="html/budget/budget.html" class="object budget">
💰
<span class="label">Budget Desk</span>
</a>

</div>

</body>
</html>
