<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Lounge: A break for your brain</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ---------- Global ---------- */

body{
margin:0;
font-family:'Orbitron',sans-serif;
background-image:url("rain.jpg");
background-size:cover;
background-position:center;
color:white;
}

/* ---------- Title ---------- */

h1{
text-align:center;
letter-spacing:3px;
font-size:2rem;
padding-top:30px;
}

/* ---------- Cafe Layout ---------- */

.cafe{

max-width:800px;
margin:60px auto;

display:grid;
grid-template-columns:1fr 1fr;
gap:30px;

padding:20px;

}

/* ---------- Object Boxes ---------- */

.object{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-decoration:none;
color:white;

background:rgba(0,0,0,0.6);
border:2px solid rgba(255,255,255,0.2);
border-radius:15px;

height:150px;

font-size:50px;

transition:
transform .25s,
box-shadow .25s,
background .25s;

}

/* ---------- Hover Effects ---------- */

.object:hover{

transform:translateY(-5px) scale(1.05);

background:rgba(0,0,0,0.75);

box-shadow:
0 0 15px rgba(255,255,255,0.5),
0 0 30px #00eaff;

}

/* ---------- Labels ---------- */

.label{

display:block;
font-size:14px;
margin-top:10px;

}

/* ---------- Mobile ---------- */

@media(max-width:700px){

.cafe{
grid-template-columns:1fr;
}

.object{
height:130px;
font-size:40px;
}

}

</style>
</head>

<body>

<h1>☕ Life Lounge Café</h1>

</a>

</a>

<a href="html/relax/relax.html" class="object">

</a>

<a href="html/horror/horror.html" class="object">
🚪

</a>

<a href="html/blog/blog.html" class="object">

<span class="label">Journal Table</span>
</a>

<a href="html/budget/budget.html" class="object">
💰
<span class="label">Budget Desk</span>
</a>

</div>

</body>
</html>
